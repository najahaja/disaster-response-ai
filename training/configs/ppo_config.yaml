# PPO-specific configuration
ppo:
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  clip_range_vf: null
  normalize_advantage: true
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  use_sde: false
  sde_sample_freq: -1
  target_kl: null

multi_agent:
  policies:
    drone_policy:
      observation_space: "global"
      action_space: "discrete"
      architecture: [64, 64]
    ambulance_policy:
      observation_space: "global" 
      action_space: "discrete"
      architecture: [128, 128]
    rescue_policy:
      observation_space: "global"
      action_space: "discrete"
      architecture: [64, 64]