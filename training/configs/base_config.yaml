training:
  algorithm: "PPO"
  total_timesteps: 100000
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  max_grad_norm: 0.5
  batch_size: 64
  n_epochs: 10
  n_steps: 1024

environment:
  name: "disaster_response"
  max_steps: 1000
  num_episodes: 1000

multi_agent:
  policy_mapping:
    drone: "drone_policy"
    ambulance: "ambulance_policy" 
    rescue_team: "rescue_policy"
  shared_observations: true
  shared_rewards: false

logging:
  log_interval: 10
  save_interval: 100
  eval_interval: 50
  tensorboard_log: "./logs/tensorboard/"
  checkpoint_dir: "./checkpoints/"

evaluation:
  eval_episodes: 10
  eval_freq: 100
  deterministic: true