environment:
  grid_size: 36
  cell_size: 15
  max_steps: 10000

  # --- FIX 1: Merged into ONE block ---
  cell_types:
    BUILDING: 0
    ROAD: 1
    HOSPITAL: 2
    OPEN_SPACE: 3
    COLLAPSED: 4
    BLOCKED: 5
    # CIVILIAN was removed (it's an object, not a tile)

agents:
  drone:
    count: 2
    speed: 2
    capacity: 1
    color: [0, 191, 255]

  ambulance:
    count: 2
    speed: 1
    capacity: 5
    color: [255, 0, 0]

  rescue_team:
    count: 1
    speed: 1
    capacity: 3
    color: [122, 250, 42]

disaster:
  collapsed_buildings: 10
  blocked_roads: 5
  civilian_spawn_chance: 0.3

visualization:
  colors:
    0: [160, 82, 45] # BUILDING (Sienna Brown)
    1: [50, 50, 50] # ROAD (Dark Grey/Black - easier to see)
    2: [255, 255, 255] # HOSPITAL (Bright White)
    3: [210, 240, 210] # OPEN_SPACE (Very Light Green - looks like land)
    4: [255, 69, 0] # COLLAPSED (Red-Orange)
    5: [128, 0, 0] # BLOCKED (Dark Red)
